name: Deploy to GitHub Pages

# Run this workflow on pushes to the main branch
on:
  push:
    branches:
      - main # Or whichever branch you want to deploy from

jobs:
  build-and-deploy:
    # Use the latest version of Ubuntu
    runs-on: ubuntu-latest

    # Add these permissions to allow the action to push to the gh-pages branch
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        # Use the latest version of the checkout action
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Use the latest version of the setup-node action
        uses: actions/setup-node@v4
        with:
          # Specify the Node.js version you are using
          node-version: '20'
          # Use npm's cache to speed up dependency installation
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        # This command should generate the static files in the 'out' directory
        # The "output: 'export'" in next.config.js is required for a static export.
        run: npm run build

      - name: Deploy to GitHub Pages
        # Use the latest version of the gh-pages action
        uses: peaceiris/actions-gh-pages@v4
        with:
          # The GITHUB_TOKEN is automatically created and passed by GitHub Actions
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The directory where your static build files are located
          publish_dir: ./out
