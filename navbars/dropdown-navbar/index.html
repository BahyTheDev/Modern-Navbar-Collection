<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Navbar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Ionicons for caret down -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <nav class="dropdown-nav">
        <div class="nav-container">
            <a href="#" class="logo">Drop Nav</a>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="#" class="nav-link">Home</a></li>
                
                <li class="dropdown">
                    <button class="dropdown-btn" aria-haspopup="true" aria-expanded="false">
                        Services <ion-icon name="chevron-down-outline" class="caret"></ion-icon>
                    </button>
                    <div class="dropdown-menu">
                        <a href="#">Web Design</a>
                        <a href="#">App Development</a>
                        <a href="#">SEO Optimization</a>
                        <a href="#">Marketing</a>
                    </div>
                </li>

                <li class="dropdown">
                    <button class="dropdown-btn" aria-haspopup="true" aria-expanded="false">
                        Products <ion-icon name="chevron-down-outline" class="caret"></ion-icon>
                    </button>
                    <div class="dropdown-menu">
                        <a href="#">Software</a>
                        <a href="#">Hardware</a>
                        <a href="#">Accessories</a>
                    </div>
                </li>

                <li><a href="#" class="nav-link">Contact</a></li>
            </ul>

            <button class="mobile-toggle" id="mobileToggle" aria-expanded="false">
                <ion-icon name="menu-outline" class="menu-icon"></ion-icon>
                <ion-icon name="close-outline" class="close-icon"></ion-icon>
            </button>
        </div>
    </nav>
    <script src="script.js"></script>
</body>
</html>
