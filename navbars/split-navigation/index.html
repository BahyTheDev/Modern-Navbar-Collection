<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Navigation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <nav class="split-nav">
        <!-- Left Section -->
        <div class="nav-side nav-left">
            <ul class="nav-links">
                <li><a href="#" class="active">Men</a></li>
                <li><a href="#">Women</a></li>
                <li><a href="#">Kids</a></li>
            </ul>
        </div>

        <!-- Center Logo -->
        <div class="nav-center">
            <a href="#" class="logo">
                <ion-icon name="aperture-outline"></ion-icon>
            </a>
        </div>

        <!-- Right Section -->
        <div class="nav-side nav-right">
            <ul class="nav-links">
                <li><a href="#">Search</a></li>
                <li><a href="#">Account</a></li>
                <li><a href="#">Cart (0)</a></li>
            </ul>
        </div>
        
        <!-- Mobile Header (Hidden on Desktop) -->
        <div class="mobile-header">
            <button class="mobile-toggle" aria-label="Menu">
                <ion-icon name="menu-outline" class="menu-icon"></ion-icon>
            </button>
            <a href="#" class="mobile-logo">
                <ion-icon name="aperture-outline"></ion-icon>
            </a>
            <button class="cart-toggle" aria-label="Cart">
                <ion-icon name="bag-outline"></ion-icon>
            </button>
        </div>
    </nav>
    
    <!-- Mobile Menu Container -->
    <div class="mobile-menu">
        <ul class="mobile-links">
            <li class="menu-label">Categories</li>
            <li><a href="#">Men</a></li>
            <li><a href="#">Women</a></li>
            <li><a href="#">Kids</a></li>
            <li class="menu-label">User</li>
            <li><a href="#">Search</a></li>
            <li><a href="#">Account</a></li>
            <li><a href="#">Cart (0)</a></li>
        </ul>
    </div>

    <!-- Page Content Area -->
    <div class="hero">
        <h1>Split Layout Architecture</h1>
        <p>A balanced aesthetic placing the brand identity at the absolute center, flanked by functional navigation on either side.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
