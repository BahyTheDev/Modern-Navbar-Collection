<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Logo Navbar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <nav class="centered-nav">
        <!-- Top Utility Bar (Optional, common with centered logos) -->
        <div class="nav-top">
            <div class="nav-container">
                <div class="top-left">
                    <span>Free shipping on all orders over $50</span>
                </div>
                <div class="top-right">
                    <a href="#">Account</a>
                    <a href="#">USD $</a>
                </div>
            </div>
        </div>

        <!-- Main Navigation -->
        <div class="nav-main">
            <div class="nav-container main-container">
                <!-- Hamburger for Mobile -->
                <button class="menu-toggle" aria-label="Toggle menu">
                    <ion-icon name="menu-outline" class="menu-icon"></ion-icon>
                    <ion-icon name="close-outline" class="close-icon"></ion-icon>
                </button>

                <!-- Left Links -->
                <ul class="nav-links left-links">
                    <li><a href="#">Shop</a></li>
                    <li><a href="#">Collections</a></li>
                    <li><a href="#">About Us</a></li>
                </ul>

                <!-- Centered Logo -->
                <a href="#" class="logo">LUXE<span>.</span></a>

                <!-- Right Links -->
                <ul class="nav-links right-links desktop-only">
                    <li><a href="#">Journal</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">Stores</a></li>
                </ul>

                <!-- Icons (Search, Cart) -->
                <div class="nav-icons">
                    <button aria-label="Search"><ion-icon name="search-outline"></ion-icon></button>
                    <button class="cart-btn" aria-label="Cart">
                        <ion-icon name="bag-outline"></ion-icon>
                        <span class="cart-count">2</span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Links Container -->
        <div class="mobile-menu">
            <ul>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Journal</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Stores</a></li>
            </ul>
        </div>
    </nav>
    <script src="script.js"></script>
</body>
</html>
