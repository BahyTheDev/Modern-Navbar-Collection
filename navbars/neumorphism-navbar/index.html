<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphism Navbar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    
    <div class="container">
        <nav class="neu-nav">
            <a href="#" class="logo">
                <ion-icon name="finger-print-outline"></ion-icon> Soft.
            </a>
            
            <ul class="nav-links">
                <li><a href="#" class="active"><ion-icon name="home"></ion-icon></a></li>
                <li><a href="#"><ion-icon name="person"></ion-icon></a></li>
                <li><a href="#"><ion-icon name="heart"></ion-icon></a></li>
                <li><a href="#"><ion-icon name="settings"></ion-icon></a></li>
            </ul>

            <button class="nav-action">
                <ion-icon name="search"></ion-icon>
            </button>
        </nav>
        
        <main class="content">
            <h1>Soft UI (Neumorphism).</h1>
            <p>A tactile, soft design philosophy using extruded shapes based on light and shadow.</p>
            
            <div class="demo-cards">
                <div class="neu-card"></div>
                <div class="neu-card"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
