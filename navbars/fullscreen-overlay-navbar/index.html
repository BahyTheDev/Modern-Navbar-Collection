<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Overlay Navbar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    
    <!-- Top Bar (Always visible) -->
    <header class="top-bar">
        <a href="#" class="logo">OVR<span>.</span></a>
        
        <button class="menu-open-btn" aria-label="Open Menu">
            <span class="text">MENU</span>
            <ion-icon name="menu-outline"></ion-icon>
        </button>
    </header>

    <!-- Fullscreen Overlay Menu -->
    <div class="overlay-nav" id="overlayNav">
        <!-- Close Button -->
        <button class="menu-close-btn" aria-label="Close Menu">
            <ion-icon name="close-outline"></ion-icon>
        </button>

        <div class="overlay-content">
            <!-- Main Navigation Links -->
            <ul class="main-menu" id="mainMenu">
                <li style="--i: 1;"><a href="#" data-text="Work">Work</a></li>
                <li style="--i: 2;"><a href="#" data-text="About">About</a></li>
                <li style="--i: 3;"><a href="#" data-text="Services">Services</a></li>
                <li style="--i: 4;"><a href="#" data-text="Contact">Contact</a></li>
            </ul>

            <!-- Secondary Info (Contact/Social) -->
            <div class="secondary-info">
                <div class="contact-box" style="--i: 5;">
                    <h3>Get in touch</h3>
                    <a href="mailto:hello@ovr.com">hello@ovr.com</a>
                    <p>+1 (555) 123-4567</p>
                </div>
                
                <div class="social-box" style="--i: 6;">
                    <h3>Follow us</h3>
                    <div class="social-links">
                        <a href="#"><ion-icon name="logo-twitter"></ion-icon></a>
                        <a href="#"><ion-icon name="logo-instagram"></ion-icon></a>
                        <a href="#"><ion-icon name="logo-dribbble"></ion-icon></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Page Content -->
    <main class="page-content">
        <h1>Immersive Navigation.</h1>
        <p>A full-page takeover menu featuring bold typography and smooth, staggered animations. Click the "MENU" button in the top right to experience.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
