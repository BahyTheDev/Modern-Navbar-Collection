<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Animated Navbar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <nav class="dark-nav">
        <div class="nav-container">
            <a href="#" class="logo">
                <span class="bracket">{</span> DevNav <span class="bracket">}</span>
            </a>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="#" class="active"><ion-icon name="terminal-outline"></ion-icon> Console</a></li>
                <li><a href="#"><ion-icon name="git-branch-outline"></ion-icon> Version Control</a></li>
                <li><a href="#"><ion-icon name="server-outline"></ion-icon> Services</a></li>
                <li><a href="#"><ion-icon name="shield-checkmark-outline"></ion-icon> Security</a></li>
            </ul>

            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round">
                        <ion-icon name="sunny" class="sun-icon"></ion-icon>
                        <ion-icon name="moon" class="moon-icon"></ion-icon>
                    </div>
                </label>
            </div>

            <button class="menu-btn" aria-label="Menu">
                <div class="burger"></div>
            </button>
        </div>
    </nav>
    
    <main class="content">
        <h1>Theme Toggler Built-In</h1>
        <p>A sleek developer-focused navbar with an integrated dark/light mode animated toggle switch.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
