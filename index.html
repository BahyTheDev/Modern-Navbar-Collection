<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Navbar Collection</title>
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <h1>Modern Navbar Collection</h1>
            <p>A curated collection of responsive, accessible, and production-ready navigation bars.</p>
        </div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search navbars...">
        </div>
        <div id="navbar-grid" class="grid-container">
            <!-- Navbar items will be dynamically inserted here -->
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="src/scripts/main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</body>
</html>
